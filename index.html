<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Psynova: Mental Health Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-background': '#f2ede4',
            'brand-dark-green': '#235328',
            'brand-light-green': '#92bb80',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            'premium': '0 8px 30px rgba(0, 0, 0, 0.04)',
            'premium-hover': '0 20px 40px rgba(146, 187, 128, 0.15)',
          },
          backgroundImage: {
            'glass-gradient': 'linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 100%)',
            'brand-gradient': 'linear-gradient(135deg, #235328 0%, #92bb80 100%)',
          }
        },
      },
    };
  </script>
  <style>
    /* Safe area insets for notches, status bars, and rounded corners */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Android/Mobile-Specific Optimizations */
    * {
      /* Smooth scrolling for all elements */
      -webkit-overflow-scrolling: touch;
      /* Disable tap highlight on Android */
      -webkit-tap-highlight-color: transparent;
    }

    /* Better touch targets - minimum 48px for accessibility */
    button,
    a,
    input,
    textarea,
    select {
      min-height: 44px;
      touch-action: manipulation;
    }

    /* Prevent text selection on buttons/cards for better mobile feel */
    button,
    .cursor-pointer {
      -webkit-user-select: none;
      user-select: none;
    }

    /* Smooth momentum scrolling */
    div,
    main,
    section {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* Improve rendering performance on mobile */
    .rounded-2xl,
    .rounded-full,
    .shadow-lg {
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      will-change: transform;
    }

    /* Reduce motion for better performance on low-end devices */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Mobile-specific font size adjustments */
    @media (max-width: 640px) {
      html {
        font-size: 14px;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .animate-fade-in-down {
      opacity: 0;
      animation: fadeInDown 0.8s ease-out both;
    }

    .animate-fade-up {
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .animate-fade-in-right {
      opacity: 0;
      animation: fadeInRight 0.8s ease-out forwards;
    }

    /* Staggered animation delays */
    .delay-100 {
      animation-delay: 100ms;
    }

    .delay-200 {
      animation-delay: 200ms;
    }

    .delay-300 {
      animation-delay: 300ms;
    }

    .delay-400 {
      animation-delay: 400ms;
    }

    .delay-500 {
      animation-delay: 500ms;
    }

    /* Premium Glassmorphism Utility */
    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    /* Particle styles — from Stitch design */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: #92bb80;
      opacity: 0.6;
    }

    .particle-leaf {
      width: 8px;
      height: 12px;
      border-radius: 50% 0 50% 0;
      background: #92bb80;
      opacity: 0.5;
      position: absolute;
      transform: rotate(45deg);
      animation: floatCard 4s ease-in-out infinite alternate;
    }

    /* ── NEW ANIMATION KEYFRAMES ── */

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-32px) scale(0.97);
      }

      70% {
        transform: translateY(4px) scale(1.01);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatCard {
      from {
        transform: translateY(0px);
      }

      to {
        transform: translateY(-8px);
      }
    }

    @keyframes shimmerBorder {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(146, 187, 128, 0);
      }

      50% {
        box-shadow: 0 0 16px 6px rgba(146, 187, 128, 0.45);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.88);
      }

      70% {
        transform: scale(1.03);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      60% {
        transform: scale(1.3);
        opacity: 1;
      }

      80% {
        transform: scale(0.85);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes msgInLeft {
      from {
        opacity: 0;
        transform: translateX(-18px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes msgInRight {
      from {
        opacity: 0;
        transform: translateX(18px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes spinSlow {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── NEW ANIMATION UTILITY CLASSES ── */

    .animate-slide-in-down {
      opacity: 0;
      animation: slideInDown 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .float-card {
      animation: floatCard 3.5s ease-in-out infinite alternate;
    }

    .shimmer-card {
      position: relative;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .shimmer-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(120deg,
          transparent 20%,
          rgba(146, 187, 128, 0.55) 40%,
          rgba(255, 255, 255, 0.7) 50%,
          rgba(146, 187, 128, 0.55) 60%,
          transparent 80%);
      background-size: 200% 100%;
      animation: shimmerBorder 3.5s linear infinite;
      z-index: -1;
      border-radius: inherit;
    }

    .pulse-glow {
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .animate-scale-in {
      animation: scaleIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .animate-bounce-in {
      animation: bounceIn 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    .msg-in-left {
      animation: msgInLeft 0.35s ease-out both;
    }

    .msg-in-right {
      animation: msgInRight 0.35s ease-out both;
    }

    .animate-spin-slow {
      animation: spinSlow 8s linear infinite;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    "react/": "https://aistudiocdn.com/react@^19.2.0/",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"

}
</script>

</head>

<body>
  <div id="root"></div>

</html>
